name: "Static Checks"
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - dev
  push:
    tags:
      - '*'

jobs:
  static-checks:
    name: 'Static Checks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Scony/godot-gdscript-toolkit@master
      - run: gdlint .
      - run: gdradon cc scripts tests
